name: Collect repository traffic

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TRAFFIC_TOKEN }}

      - name: Collect traffic data
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          DATE="$(date -u +%F)"
          OUTPUT_DIR="traffic/$DATE"
          mkdir -p "$OUTPUT_DIR"

          api_get() {
            local endpoint="$1"
            local output="$2"

            curl \
              --fail-with-body \
              --silent \
              --show-error \
              --location \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPOSITORY/$endpoint" \
              --output "$output"
          }

          api_get "traffic/views?per=day" \
            "$OUTPUT_DIR/views.json"

          api_get "traffic/clones?per=day" \
            "$OUTPUT_DIR/clones.json"

          api_get "traffic/popular/referrers" \
            "$OUTPUT_DIR/referrers.json"

          api_get "traffic/popular/paths" \
            "$OUTPUT_DIR/popular-paths.json"

          api_get "" \
            "$OUTPUT_DIR/repository.json"

      - name: Create summary
        shell: bash
        run: |
          python3 <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          date = datetime.now(timezone.utc).date().isoformat()
          directory = Path("traffic") / date

          def load(name):
              with (directory / name).open(
                  "r",
                  encoding="utf-8",
              ) as file:
                  return json.load(file)

          views = load("views.json")
          clones = load("clones.json")
          repository = load("repository.json")
          referrers = load("referrers.json")
          paths = load("popular-paths.json")

          summary = {
              "collected_at": datetime.now(
                  timezone.utc
              ).isoformat(),
              "repository": repository.get("full_name"),
              "stars": repository.get("stargazers_count", 0),
              "forks": repository.get("forks_count", 0),
              "open_issues": repository.get(
                  "open_issues_count",
                  0,
              ),
              "views_last_14_days": views.get("count", 0),
              "unique_visitors_last_14_days": views.get(
                  "uniques",
                  0,
              ),
              "clones_last_14_days": clones.get("count", 0),
              "unique_cloners_last_14_days": clones.get(
                  "uniques",
                  0,
              ),
              "top_referrers": referrers,
              "popular_paths": paths,
          }

          with (directory / "summary.json").open(
              "w",
              encoding="utf-8",
          ) as file:
              json.dump(
                  summary,
                  file,
                  ensure_ascii=False,
                  indent=2,
              )
              file.write("\n")
          PY

      - name: Commit statistics
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add traffic/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: save repository traffic"
          git push
